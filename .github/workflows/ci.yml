name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Required by the Storybook (browser) test project.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm check:contracts
      - run: pnpm test # unit (jsdom + axe) across all packages
      - run: pnpm test:stories # stories-as-tests in a real browser
      - run: pnpm build
      - run: pnpm verify:exports
      - run: pnpm build:storybook
